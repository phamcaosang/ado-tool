<mat-tab-group mat-stretch-tabs="false" mat-align-tabs="center" *ngIf="config">
  <mat-tab label="Web apps">
    <app-pipeline-table [type]="PipelineType.WebApp"></app-pipeline-table>
  </mat-tab>
  <mat-tab label="Function apps">
    <app-pipeline-table [type]="PipelineType.FuncApp"></app-pipeline-table>
  </mat-tab>
  <mat-tab label="Configurations">
    <pre>{{ config | json }}</pre>
  </mat-tab>
</mat-tab-group>
